<body>
  <header class="navbar">
    <a class="logo" href="index.html"><span><img src="Media/ikona.gif" alt="Logo"></span> ŠportniPartner.si</a>
    <nav>
      <a href="index.html">Domov</a>

      <a href="#" id="logoutLink" class="hidden" onclick="odjava()">Odjava</a>
    </nav>

  <main class="page">
    <section class="page-title"><p class="badge">Stalna družba</p><h1>Redni termini</h1><p>Aktivnosti, ki se ponavljajo vsak teden.</p></section>
    
    <section class="filters card">
      <input id="search" type="text" placeholder="Išči po športu ali kraju ..." />
      <select id="sport">
        <option value="">Vsi športi</option>
        <option>Odbojka</option>
        <option>Nogomet</option>
        <option>Košarka</option>
        <option>Tenis</option>
        <option>Tek</option>
      </select>
      <select id="level">
        <option value="">Vse ravni</option>
        <option>Začetnik</option>
        <option>Srednja</option>
        <option>Napredna</option>
      </select>
      <select id="gender">
        <option value="">Vsi spoli</option>
        <option>Mešano</option>
        <option>Moški</option>
        <option>Ženske</option>
      </select>
      <select id="age">
        <option value="">Vse starosti</option>
        <option>15-18</option>
        <option>18-30</option>
        <option>30+</option>
      </select>
      <label class="check"><input id="available" type="checkbox" /> Samo prosta mesta</label>
    </section>
    
    <section id="activityList" class="activity-list"></section>

  </main>
  <footer>© 2026 ŠportniPartner.si · Projektna ekipa Športalčki</footer>
