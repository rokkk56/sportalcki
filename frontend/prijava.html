<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava | Športalčki</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <span>Š</span> Športalčki
    </div>
    <nav>
        <a href="index.html">Domov</a>
        <a href="aktivnosti.html">Aktivnosti</a>
        <a href="objavi.html">Objavi oglas</a>
        <a href="prijava.html" id="loginLink">Prijava</a>
        <a href="profil.html" id="profileLink" class="hidden">Profil</a>
        <a href="admin.html" id="adminLink" class="hidden">Administrator</a>
        <a href="#" id="logoutLink" class="hidden" onclick="odjava()">Odjava</a>
    </nav>
</header>

<main class="page narrow">

    <section class="page-title">
        <span class="badge">Prijava</span>
        <h1>Prijavi se</h1>
        <p>
            Prijavi se kot uporabnik ali administrator.
        </p>
    </section>

    <section class="card">
        <form class="form" id="loginForm">

            <div>
                <label for="username">Uporabniško ime</label>
                <input type="text" id="username" placeholder="Vnesi uporabniško ime" required>
            </div>

            <div>
                <label for="password">Geslo</label>
                <input type="password" id="password" placeholder="Vnesi geslo" required>
            </div>

            <button type="submit" class="btn primary">Prijava</button>

            <div id="g_id_onload"
                data-client_id="611174763274-3nfnu9nnkqobtiv1pmtlvvvbgiupag35.apps.googleusercontent.com"
                data-callback="handleGoogleLogin">
            </div>

            <div class="g_id_signin"
                data-type="standard">
            </div>

            <p id="loginMessage" class="success hidden"></p>
            <p>Še nimaš računa? <a href="registracija.html">Registriraj se</a></p>

        </form>
    </section>

</main>

<footer>
    <p>© 2026 Športalčki | ŠportniPartner.si</p>
</footer>

<script src="script.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
