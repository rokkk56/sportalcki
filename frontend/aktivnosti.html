<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aktivnosti | ŠportniPartner.si</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <a class="logo" href="index.html"><span>Š</span> ŠportniPartner.si</a>
    <nav>
      <a href="index.html">Domov</a>
      <a href="aktivnosti.html">Aktivnosti</a>
      <a href="objavi.html">Objavi oglas</a>
      <a href="prijava.html" id="loginLink">Prijava</a>
      <a href="profil.html" id="profileLink" class="hidden">Profil</a>
      <a href="admin.html" id="adminLink" class="hidden">Administrator</a>
      <a href="#" id="logoutLink" class="hidden" onclick="odjava()">Odjava</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-title">
      <p class="badge">Iskanje aktivnosti</p>
      

      <div class="title-row">
        <h1>Poišči športno aktivnost</h1>

        <button id="redniTerminiBtn" class="btn redni-btn big" onclick="prikaziRedneTermine()">
          Redni termini
        </button>
      </div>

      <p id="organizatorSporocilo" class="error-message"></p>
      
      <p>Filtriraj po športu, kraju, datumu, zahtevnosti, spolu, starosti in prostih mestih.</p>

    </section>

    <section class="filters card">
      <input id="search" type="text" placeholder="Išči po športu ali kraju ..." />

      <select id="sport">
        <option value="">Vsi športi</option>
        <option value="Odbojka">Odbojka</option>
        <option value="Nogomet">Nogomet</option>
        <option value="Košarka">Košarka</option>
        <option value="Tenis">Tenis</option>
        <option value="Tek">Tek</option>
      </select>

      <input id="date" type="date" />

      <select id="level">
        <option value="">Vse ravni</option>
        <option value="Začetnik">Začetnik</option>
        <option value="Srednje">Srednje</option>
        <option value="Napredno">Napredno</option>
        <option value="Rekreativno">Rekreativno</option>
      </select>

      <select id="gender">
        <option value="">Vsi spoli</option>
        <option value="Mešano">Mešano</option>
        <option value="Moški">Moški</option>
        <option value="Ženske">Ženske</option>
      </select>

      <select id="age">
        <option value="">Vse starosti</option>
        <option value="Do 18 let">Do 18 let</option>
        <option value="18-25 let">18-25 let</option>
        <option value="26-35 let">26-35 let</option>
        <option value="36+ let">36+ let</option>
      </select>

      <label class="check">
        <input id="available" type="checkbox" /> 
        Samo prosta mesta
      </label>
    </section>

    <section id="activityList" class="activity-list"></section>
  </main>

  <footer>© 2026 ŠportniPartner.si · Projektna ekipa Športalčki</footer>
  <script src="script.js"></script>
  <script>
    naloziAktivnosti(false);
  </script>
</body>
</html>
