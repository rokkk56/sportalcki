<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aktivnost | ŠportniPartner.si</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <a class="logo" href="index.html"><span><img src="Media/ikona.gif" alt="Logo"></span> ŠportniPartner.si</a>
    <nav>
      <a href="index.html">Domov</a>
      <a href="aktivnosti.html" class="active">Aktivnosti</a>
      <a href="objavi.html">Objavi aktivnost</a>
      <a href="prijava.html" id="loginLink">Prijava</a>
      <a href="profil.html" id="profileLink" class="hidden">Profil</a>
      <a href="admin.html" id="adminLink" class="hidden">Administrator</a>
      <a href="#" id="logoutLink" class="hidden" onclick="odjava()">Odjava</a>
    </nav>
  </header>

  <main class="page-aktivnost">
    <section class="page-title">
      <p class="badge">Podrobnosti aktivnosti</p>
      <h1 id="aktivnostNaslov">Aktivnost</h1>
    </section>

    <section id="aktivnostPodrobnosti"></section>

    <section id="redniKomentarjiSekcija" class="card hidden">
      <h2>Komentarji</h2>

      <div id="aktivnostKomentarji"></div>

      <form id="podrobnostiKomentarForm" class="card" style="margin-top: 20px;">
        <textarea id="podrobnostiKomentarInput" placeholder="Napiši komentar..." required></textarea>

        <input type="file" id="podrobnostiKomentarSlika" accept="image/*" style="margin-bottom:10px">

        <button class="btn primary" type="submit">Pošlji komentar</button>

        <p id="podrobnostiKomentarSporocilo"></p>
      </form>
    </section>
  </main>
  <footer>
    <div class="footer">
      <p>© 2026 <strong>ŠportniPartner.si</strong> · Projektna ekipa <span>Športalčki</span></p>
      </div>
    </footer>
  <script src="script.js"></script>
</body>
</html>
